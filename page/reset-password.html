<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | EduMap</title>
    <link rel="stylesheet" href="../css/forgot-password.css">
</head>
<body>
    <div class="edumap-bg">
        <div class="particles"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
    </div>
    
    <main class="auth-wrapper">
        <div class="auth-card">
            <h1>Mật khẩu mới</h1>
            <p>Vui lòng nhập mật khẩu mới cho tài khoản của bạn. Hãy sử dụng mật khẩu mạnh để bảo mật.</p>
            
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)" autocomplete="new-password" required>
            </div>
            
            <button id="btnSave" class="btn-submit">Cập nhật mật khẩu</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabse.js"></script>
    <script src="../js/reset-password.js"></script>
    <script src="../js/theme.js"></script>
</body>
</html>
