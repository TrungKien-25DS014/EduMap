<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu | EduMap</title>
    <link rel="stylesheet" href="../css/forgot-password.css">
</head>
<body>
    <div class="edumap-bg">
        <div class="particles"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
    </div>
    <main class="auth-wrapper">
        <div class="auth-card">
            <h1>Quên mật khẩu?</h1>
            <p>Đừng lo lắng! Hãy nhập email bạn đã đăng ký, chúng tôi sẽ gửi liên kết khôi phục mật khẩu cho bạn.</p>
            <div class="form-group">
                <input 
                    type="email" 
                    id="email" 
                    placeholder="VD: name@example.com" 
                    autocomplete="email"
                    required
                >
            </div>
            <button id="btnReset" class="btn-submit">
                Gửi liên kết khôi phục
            </button>
            <div class="auth-links">
                <span style="color: var(--text-muted);">Đã nhớ ra mật khẩu?</span>
                <a href="index.html">Quay lại đăng nhập</a>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabse.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
