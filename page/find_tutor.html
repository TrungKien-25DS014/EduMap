<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMap — Discovery Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/find_tutor.css">
</head>
<body>
    <div class="edumap-bg">
        <div class="particles"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">EduMap<span>.</span></div>
            <ul class="nav-links">
                <li><a href="find_tutor.html" class="active">Khám phá</a></li>
                <li><a href="community.html">Cộng đồng</a></li>
                <li><a href="leaderboard.html">Xếp hạng</a></li>
            </ul>
            <div class="user-profile">
                <span class="user-name">Kiên</span>
                <div class="avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Kien" alt="Avatar">
                </div>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bubbles">
            <div class="hero-bubble hb1"></div>
            <div class="hero-bubble hb2"></div>
            <div class="hero-bubble hb3"></div>
        </div>
        <div class="hero-content">
            <h1>Chào mừng trở lại, Kiên 👋</h1>
            <p>Hệ thống ghi nhận 128 bạn học đang online quanh khu vực Đà Nẵng</p>
            <div class="hero-btns">
                <button class="btn-primary"><i class="fa-solid fa-earth-asia"></i> Khám phá cộng đồng</button>
                <button class="btn-secondary">Tìm tutor AI</button>
            </div>
        </div>
    </section>

    <main class="main-container">
        
        <div class="map-card card">
            <div class="map-header">
                <h3>Live Activity Map</h3>
                <span class="status-live"><i class="fa-solid fa-circle"></i> Hệ thống đang ghi nhận thời gian thực</span>
            </div>
            <div class="map-placeholder">
                <div class="marker m1">
                    <div class="pulse"></div>
                    <img src="https://i.pravatar.cc/150?u=11" alt="tutor">
                </div>
                <div class="marker m2">
                    <div class="pulse"></div>
                    <img src="https://i.pravatar.cc/150?u=22" alt="tutor">
                </div>
                <div class="map-label">
                    <i class="fa-solid fa-location-dot"></i> Đà Nẵng — 120 học viên & 8 gia sư
                </div>
            </div>
        </div>
    </main>

</body>
</html>
