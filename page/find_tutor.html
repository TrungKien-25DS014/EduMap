<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMap - Live Map</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- LEAFLET -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/find_tutor.css">
</head>

<body>

    <!-- BACKGROUND -->
    <div class="edumap-bg">
        <div class="particles"></div>

        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">

            <div class="logo">
                EduMap<span>.</span>
            </div>

            <ul class="nav-links">
                <li><a href="#" class="active">Khám phá</a></li>
                <li><a href="community.html">Cộng đồng</a></li>
                <li><a href="leaderboard.html">Xếp hạng</a></li>
            </ul>

            <div class="user-profile">
                <span class="user-name">Kiên</span>

                <div class="avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Kien"
                        alt="">
                </div>
            </div>

        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-content">
            <h1>Live Activity Map</h1>

            <p>
                Hệ thống đang ghi nhận tutor & học viên theo thời gian thực
            </p>

            <div class="hero-btns">
                <button class="btn-primary">
                    <i class="fa-solid fa-location-dot"></i>
                    Khám phá quanh bạn
                </button>

                <button class="btn-secondary">
                    Tutor AI
                </button>
            </div>
        </div>

    </section>

    <!-- MAIN -->
    <main class="main-container">

        <div class="card map-card">

            <div class="map-header">

                <h2>
                    <i class="fa-solid fa-map-location-dot"></i>
                    Bản đồ thời gian thực
                </h2>

                <span class="status-live">
                    <i class="fa-solid fa-circle"></i>
                    Online
                </span>

            </div>

            <!-- MAP -->
            <div class="map-wrapper">
                <div id="map"></div>
            </div>

        </div>

    </main>

    <!-- LEAFLET -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- JS -->
    <script src="../js/find_tutor.js"></script>

</body>

</html>
