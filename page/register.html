<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<body>
<div class="auth-page">
    <div class="auth-box">
        <h2>Đăng ký</h2>
        <p><strong>Bạn đăng ký làm:</strong></p>
        <div class="role-select">
            <label class="role-option">
                <input type="radio" name="role" value="tutor" checked>
                <span>🎓 Gia sư</span>
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="student">
                <span>📚 Học viên</span>
            </label>
        </div>
        <input type="text" id="fullName" placeholder="Họ và tên">
        <input type="text" id="email" placeholder="Email hoặc SĐT">
        <input type="password" id="password" placeholder="Mật khẩu">
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
        <div class="g-recaptcha" data-sitekey="6Lf0W-IsAAAAAJAIIt1WZs5Ho5klCbLloBGX1Q69"></div>
        <button>Đăng ký</button>
        <a href="login.html">Đăng nhập</a>
        <br><br>
        <a href="index.html">⬅ Trang chủ</a>
    </div>
</div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
