<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng xếp hạng - EduMap</title>
    <link rel="stylesheet" href="../css/leaderboard.css">
    <link rel="stylesheet" href="../css/community.css">
    <link rel="stylesheet" href="../css/find_tutor.css">    
</head>
<body>
    <div class="edumap-bg">
        <div class="particles"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
    </div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">EduMap<span>.</span></div>
            <ul class="nav-links">
                <a href="index.html">Trang chủ</a>
                <li><a href="find_tutor.html">Khám phá</a></li>
                <li><a href="community.html">Cộng đồng</a></li>
                <li><a href="leaderboard.html" class="active">Xếp hạng</a></li>
            </ul>
            <div class="user-profile">
                <span class="user-name" id="userNameDisplay">Đang tải...</span>
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar" id="userAvatarDisplay">
                        <img id="userAvatarImg" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="Avatar">
                    </div>
                                        <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-info" id="dropdownUserInfo">
                            <p id="dropdownUserName">...</p>
                            <small id="dropdownUserEmail">...</small>
                        </div>
                        <div class="dropdown-divider"></div>
                        <label class="dropdown-item theme-toggle-row" style="cursor:pointer;">
                            <i class="fa-solid fa-circle-half-stroke"></i>
                            <span>Chế độ sáng</span>
                            <input type="checkbox" id="dropdownThemeToggle" style="margin-left:auto;">
                        </label>
                        <div class="dropdown-divider"></div>
                        <button id="btnLogout" class="logout-btn">
                            <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="leaderboard-header">
            <h2>Bảng Xếp Hạng Người Dùng</h2>
            <p style="color:#666; margin-top:6px; margin-bottom: 70px;">Xếp hạng dựa trên điểm đánh giá của học sinh</p>
        </div>
        <div class="top-three">
            <div class="card rank-2">
                <div class="rank">#2</div>
                <img class="avatar" src="https://i.pravatar.cc/150?img=5" alt="Avt">
                <div class="name">Trần Mai Anh</div>
                <div class="points">1,920 điểm</div>
            </div>
            <div class="card rank-1">
                <div class="rank">#1</div>
                <img class="avatar" src="https://i.pravatar.cc/150?img=26" alt="Avt">
                <div class="name">Vũ Quốc Đạt</div>
                <div class="points">2,480 điểm</div>
            </div>
            <div class="card rank-3">
                <div class="rank">#3</div>
                <img class="avatar" src="https://i.pravatar.cc/150?img=12" alt="Avt">
                <div class="name">Nguyễn Lê Vy</div>
                <div class="points">1,640 điểm</div>
            </div>
        </div>
        
        <div class="table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Gia sư</th>
                        <th>Số điểm</th>
                        <th>Thành tích</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabse.js"></script>
    <script src="../js/user-info.js"></script>
    <script src="../js/find_tutor.js"></script>
    <script src="../js/leaderboard.js"></script>
    <script src="../js/theme.js"></script>
</body>
</html>
